<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">College Portal</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body text-center">

            <h2>Welcome to Student Dashboard 🎓</h2>

            <p class="lead">
                College Management & Student Information Portal
            </p>

        </div>
    </div>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>📢 Notices</h4>
                    <p>View latest college notices.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>📅 Events</h4>
                    <p>Upcoming college events.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h4>📚 Study Materials</h4>
                    <p>Access notes and resources.</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
