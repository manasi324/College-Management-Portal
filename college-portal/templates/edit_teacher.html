<!DOCTYPE html>
<html>
<head><title>Edit Teacher</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
<div class="container mt-5">
<h2>Edit Teacher</h2>
<form method="POST">
    <input class="form-control mb-2" name="name" value="{{ teacher.name }}" required>
    <input class="form-control mb-2" name="email" value="{{ teacher.email }}" required>
    <input class="form-control mb-2" name="password" value="{{ teacher.password }}" required>
    <select class="form-control mb-2" name="department" required>
        {% for d in departments %}
        <option value="{{ d.name }}" {% if teacher.department_id == d.id %}selected{% endif %}>{{ d.name }}</option>
        {% endfor %}
        </select>
    <button class="btn btn-primary">Update</button>
    <a href="{{ url_for('manage_teachers') }}" class="btn btn-secondary">Cancel</a>
</form>
</div>
</body>
</html>
