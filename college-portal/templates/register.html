<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - College Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .register-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
        }

        .register-card p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .icon-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 40px;
            color: #667eea;
        }

        .role-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .role-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .role-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .role-content {
            display: none;
        }

        .role-content.active {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="icon-header">
            <i class="bi bi-person-plus-fill"></i>
        </div>

        <h2>Create Account</h2>
        <p>Register as Student, Teacher, or HOD</p>

        {% if error %}
            <div class="error-message">
                <i class="bi bi-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}

        {% if success %}
            <div class="success-message">
                <i class="bi bi-check-circle"></i> {{ success }}
            </div>
        {% endif %}

        <!-- Role Selection Tabs -->
        <div class="role-tabs">
            <button class="role-tab active" onclick="switchRole('student')">
                <i class="bi bi-book"></i> Student
            </button>
            <button class="role-tab" onclick="switchRole('teacher')">
                <i class="bi bi-person-workspace"></i> Teacher
            </button>
            <button class="role-tab" onclick="switchRole('hod')">
                <i class="bi bi-person-badge"></i> HOD
            </button>
        </div>

        <!-- STUDENT REGISTRATION -->
        <div id="student" class="role-content active">
            <form method="POST">
                <input type="hidden" name="role" value="Student">
                
                <div class="form-group">
                    <label for="student_name">Full Name</label>
                    <input type="text" id="student_name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="student_email">Email</label>
                    <input type="email" id="student_email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="student_password">Password</label>
                    <input type="password" id="student_password" name="password" placeholder="Enter password" required minlength="6">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="course">Course</label>
                        <input type="text" id="course" name="course" placeholder="e.g., B.Sc" required>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="text" id="year" name="year" placeholder="e.g., 1st Year" required>
                    </div>
                    <div class="form-group">
    <label>Department</label>

    <select name="department" class="form-control" required>
        <option value="">-- Select Department --</option>

        {% for dept in departments %}
            <option value="{{ dept.name }}">
                {{ dept.name }}
            </option>
        {% endfor %}
    </select>
</div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="bi bi-person-plus"></i> Register as Student
                </button>
            </form>
        </div>

        <!-- TEACHER REGISTRATION -->
        <div id="teacher" class="role-content">
            <form method="POST">
                <input type="hidden" name="role" value="Teacher">
                
                <div class="form-group">
                    <label for="teacher_name">Full Name</label>
                    <input type="text" id="teacher_name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="teacher_email">Email</label>
                    <input type="email" id="teacher_email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="teacher_password">Password</label>
                    <input type="password" id="teacher_password" name="password" placeholder="Enter password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="teacher_department">Department</label>
                    <select id="teacher_department" name="department" required>
                        <option value="">-- Select Department --</option>
                        {% for dept in departments %}
                            <option value="{{ dept.name }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-register">
                    <i class="bi bi-person-plus"></i> Register as Teacher
                </button>
            </form>
        </div>

        <!-- HOD REGISTRATION -->
        <div id="hod" class="role-content">
            <form method="POST">
                <input type="hidden" name="role" value="HOD">
                
                <div class="form-group">
                    <label for="hod_name">Full Name</label>
                    <input type="text" id="hod_name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="hod_email">Email</label>
                    <input type="email" id="hod_email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="hod_password">Password</label>
                    <input type="password" id="hod_password" name="password" placeholder="Enter password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="hod_department">Department</label>
                    <select id="hod_department" name="department" required>
                        <option value="">-- Select Department --</option>
                        {% for dept in departments %}
                            <option value="{{ dept.name }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-register">
                    <i class="bi bi-person-plus"></i> Register as HOD
                </button>
            </form>
        </div>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>

<script>
    function switchRole(role) {
        // Hide all content
        document.querySelectorAll('.role-content').forEach(el => {
            el.classList.remove('active');
        });
        
        // Remove active from all tabs
        document.querySelectorAll('.role-tab').forEach(el => {
            el.classList.remove('active');
        });
        
        // Show selected content and tab
        document.getElementById(role).classList.add('active');
        event.target.closest('.role-tab').classList.add('active');
    }
</script>

</body>
</html>
