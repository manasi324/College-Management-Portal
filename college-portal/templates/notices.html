<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Notices</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .card{
            border:none;
            border-radius:15px;
        }

        h2{
            font-weight:700;
            color:#0d6efd;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="mb-4">📢 College Notices</h2>

    {% if notices %}

        {% for notice in notices %}

        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h4>{{ notice.title }}</h4>
                <p class="text-muted mb-0">{{ notice.description }}</p>
            </div>
        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">
            No notices available.
        </div>

    {% endif %}

    <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-3">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
