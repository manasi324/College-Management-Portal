<!DOCTYPE html>
<html>
<head>
    <title>Manage Notices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2>Manage Notices</h2>
 <div class="card p-4 mb-4">
        <form method="POST">
            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            <button class="btn btn-primary">Add Notice</button>
        </form>
    </div>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for notice in notices %}
            <tr>
                <td>{{ notice.id }}</td>
                <td>{{ notice.title }}</td>
                <td>{{ notice.description }}</td>
              <td style="white-space: nowrap;">
    <a href="{{ url_for('edit_notice', id=notice.id) }}" class="btn btn-warning btn-sm">Edit</a>
    <a href="{{ url_for('delete_notice', id=notice.id) }}" class="btn btn-danger btn-sm">Delete</a>
</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">No notices yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('principal_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>

</div>

</body>
</html>
