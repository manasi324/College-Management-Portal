<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registered Teachers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Registered Teachers</h2>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-hover table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                {% for teacher in teachers %}
                <tr>
                    <td>{{ teacher.user.id }}</td>
                    <td>{{ teacher.user.name }}</td>
                    <td>{{ teacher.user.email }}</td>
                    <td>{{ teacher.department.name }}</td>

                    <td>
                        <a href="/edit_teacher/{{ teacher.user.id }}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/delete_teacher/{{ teacher.user.id }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}

                </tbody>

            </table>

            <a href="/hod_dashboard" class="btn btn-secondary">
                Back to Dashboard
            </a>

        </div>
    </div>

</div>

</body>
</html>
