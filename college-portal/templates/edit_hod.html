<!DOCTYPE html>
<html>
<head><title>Edit HOD</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
<div class="container mt-5">
<h2>Edit HOD</h2>
<form method="POST">
    <input class="form-control mb-2" name="name" value="{{ hod.name }}" required>
    <input class="form-control mb-2" name="email" value="{{ hod.email }}" required>
    <input class="form-control mb-2" name="password" value="{{ hod.password }}" required>
    <select class="form-control mb-2" name="department" required>
        {% for d in departments %}
        <option value="{{ d.name }}" {% if hod.department_id == d.id %}selected{% endif %}>{{ d.name }}</option>
        {% endfor %}
    </select>
    <button class="btn btn-primary">Update</button>
    <a href="{{ url_for('manage_hods') }}" class="btn btn-secondary">Cancel</a>
</form>
</div>
</body>
</html>
