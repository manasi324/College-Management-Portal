<!DOCTYPE html>
<html>
<head><title>Add HOD</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
<div class="container mt-5">
<h2>Add HOD</h2>
<form method="POST">
    <input class="form-control mb-2" name="name" placeholder="Name" required>
    <input class="form-control mb-2" name="email" placeholder="Email" required>
    <input class="form-control mb-2" name="password" placeholder="Password" required>
    <select class="form-control mb-2" name="department" required>
        {% for d in departments %}
        <option value="{{ d.name }}">{{ d.name }}</option>
        {% endfor %}
    </select>
    <button class="btn btn-primary">Add HOD</button>
    <a href="{{ url_for('manage_hods') }}" class="btn btn-secondary">Cancel</a>
</form>
</div>
</body>
</html>
