<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Edit Material</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>✏ Edit Study Material</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Subject</label>
                    <input
                        type="text"
                        name="subject"
                        class="form-control"
                        value="{{ material.subject }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Title</label>
                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        value="{{ material.title }}"
                        required>
                </div>

                <div class="mb-3">
                    <label>Material Link</label>
                    <input
                        type="url"
                        name="link"
                        class="form-control"
                        value="{{ material.link }}"
                        required>
                </div>

                <button class="btn btn-success">
                    Update Material
                </button>

                <a href="/study_materials" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
